name: Security and Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan current tree for secrets
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          ./gitleaks dir --redact=100 --no-banner .

      - name: Test and audit deployer
        shell: bash
        run: |
          set -euo pipefail
          buildah bud --layers --target test \
            --file deploy/Containerfile.bundle \
            --tag localhost/arcturus-control-plane-test:${{ github.sha }} .

      - name: Test and audit router
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix modules/router ci
          npm --prefix modules/router test
          npm --prefix modules/router audit --omit=dev

      - name: Build and audit registry
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix modules/registry ci
          npm --prefix modules/registry run build
          npm --prefix modules/registry audit --omit=dev

      - name: Validate Terraform module
        shell: bash
        run: |
          set -euo pipefail
          version="1.10.5"
          archive="terraform_${version}_linux_amd64.zip"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            "https://releases.hashicorp.com/terraform/${version}/$archive"
          echo "0566a24f5332098b15716ebc394be503f4094acba5ba529bf5eb0698ed5e2a90  $archive" | sha256sum -c -
          unzip -q "$archive" -d /tmp/arcturus-terraform
          terraform_bin="/tmp/arcturus-terraform/terraform"
          for module in terraform-modules/arcturus-deploy terraform-modules/arcturus-host; do
            "$terraform_bin" -chdir="$module" fmt -check -recursive
            "$terraform_bin" -chdir="$module" init -backend=false -input=false
            "$terraform_bin" -chdir="$module" validate
          done
