name: Bug report
description: Report a reproducible Arcturus defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private host data, or unredacted logs.
  - type: input
    id: version
    attributes:
      label: Arcturus version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Distribution, Podman, systemd, Python, Node, and deployment mode.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted logs
    validations:
      required: true
