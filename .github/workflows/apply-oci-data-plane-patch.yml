name: Apply OCI data-plane patch

on:
  pull_request:
    paths:
      - '.arcturus/oci-data-plane.patch.gz.b64'
      - '.github/workflows/apply-oci-data-plane-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed source patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .arcturus/oci-data-plane.patch.gz.b64 | gzip --decompress > "$RUNNER_TEMP/oci-data-plane.patch"
          git apply --check "$RUNNER_TEMP/oci-data-plane.patch"
          git apply --index "$RUNNER_TEMP/oci-data-plane.patch"
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'feat: add local read-only OCI artifact data plane'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
