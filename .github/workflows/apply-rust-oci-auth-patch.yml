name: Apply Rust OCI authorization patch

on:
  pull_request:
    paths:
      - '.arcturus/rust-oci-auth.patch.gz.b64'
      - '.github/workflows/apply-rust-oci-auth-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed source patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .arcturus/rust-oci-auth.patch.gz.b64 | gzip --decompress > "$RUNNER_TEMP/rust-oci-auth.patch"
          git apply --check "$RUNNER_TEMP/rust-oci-auth.patch"
          git apply "$RUNNER_TEMP/rust-oci-auth.patch"
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
      - name: Format and lock Rust workspace
        working-directory: rust
        run: |
          cargo +1.97.0 fmt --all
          cargo +1.97.0 generate-lockfile
      - name: Compile, lint, and test Rust workspace
        id: compile
        continue-on-error: true
        working-directory: rust
        shell: bash
        run: |
          set +e
          {
            cargo +1.97.0 clippy --locked --workspace --all-targets --all-features -- -D warnings
            clippy_status=$?
            if (( clippy_status == 0 )); then
              cargo +1.97.0 test --locked --workspace --all-targets
              test_status=$?
            else
              test_status=0
            fi
            exit_code=$((clippy_status || test_status))
            echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
            exit "$exit_code"
          } > compiler.log 2>&1
      - name: Upload compiler output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-oci-auth-compiler-log
          path: rust/compiler.log
          if-no-files-found: error
          retention-days: 1
      - name: Require successful compilation
        if: steps.compile.outputs.exit_code != '0'
        run: exit 1
      - name: Commit compiled source
        shell: bash
        run: |
          set -euo pipefail
          rm -f rust/compiler.log
          git add .github/workflows/security.yml CONTRIBUTING.md docs rust
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'feat: add Rust OCI upload authorization'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
