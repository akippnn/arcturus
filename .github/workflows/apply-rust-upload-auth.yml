name: Apply Rust upload authorization patch

on:
  push:
    branches:
      - feat/rust-oci-upload-authorization
    paths:
      - 'bootstrap/upload-auth.patch.gz.b64.part-*'
      - '.github/workflows/apply-rust-upload-auth.yml'

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/rust-oci-upload-authorization
          fetch-depth: 0
      - name: Apply product patch
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/upload-auth.patch.gz.b64.part-* | base64 --decode | gzip --decompress > /tmp/upload-auth.patch
          git apply --index /tmp/upload-auth.patch
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
      - name: Format and lock Rust workspace
        working-directory: rust
        run: |
          cargo +1.97.0 fmt --all
          cargo +1.97.0 generate-lockfile
      - name: Lint Rust workspace
        working-directory: rust
        run: cargo +1.97.0 clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test Rust workspace
        working-directory: rust
        run: cargo +1.97.0 test --locked --workspace --all-targets
      - name: Validate documentation links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          roots = [Path('README.md'), Path('CONTRIBUTING.md'), Path('SECURITY.md'), *Path('docs').rglob('*.md')]
          broken = []
          for document in roots:
              text = document.read_text(encoding='utf-8')
              for target in re.findall(r'\[[^]]+\]\(([^)]+)\)', text):
                  if target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  path = target.split('#', 1)[0]
                  if path and not (document.parent / path).resolve().exists():
                      broken.append(f'{document}: {target}')
          if broken:
              raise SystemExit('Broken Markdown links:\n' + '\n'.join(broken))
          PY
      - name: Commit validated product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs rust
          git diff --cached --check
          git commit -m 'feat: add Rust OCI upload authorization preview'
          git push origin HEAD:feat/rust-oci-upload-authorization
