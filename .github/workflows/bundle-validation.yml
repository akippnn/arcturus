name: Bundle validation

on:
  push:
    paths:
      - 'deploy/**'
      - 'modules/**'
      - 'rust/**'
      - '.github/workflows/bundle-validation.yml'
  pull_request:
    paths:
      - 'deploy/**'
      - 'modules/**'
      - 'rust/**'
      - '.github/workflows/bundle-validation.yml'
  workflow_dispatch:

concurrency:
  group: bundle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build and test host bundle
        run: docker build --target test --file deploy/Containerfile.bundle .
