name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NPM_CONFIG_FETCH_RETRIES: '2'
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '10000'
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '30000'
  NPM_CONFIG_FETCH_TIMEOUT: '60000'
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_RETRIES: '5'

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: deploy/requirements.txt
      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if (( attempt == 3 )); then
                return 1
              fi
              echo "Dependency install failed; retrying after $((attempt * 20)) seconds..." >&2
              sleep $((attempt * 20))
            done
          }
          retry python -m pip install --disable-pip-version-check --requirement deploy/requirements.txt
      - name: Compile and test control plane
        env:
          PYTHONPATH: deploy
          CERT_DOMAIN: example.org
        run: |
          python -m compileall -q deploy
          python -W error::ResourceWarning -m unittest discover -s deploy/tests -v

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
      - name: Check formatting
        run: cargo +1.97.1 fmt --all --check
      - name: Lint Rust workspace
        run: cargo +1.97.1 clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test Rust workspace
        run: cargo +1.97.1 test --locked --workspace --all-targets

  node:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        module: [router, bus, registry]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            modules/bus/package-lock.json
            modules/registry/package-lock.json
            modules/router/package-lock.json
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if (( attempt == 3 )); then
                return 1
              fi
              echo "npm install failed; retrying after $((attempt * 20)) seconds..." >&2
              sleep $((attempt * 20))
            done
          }
          retry npm --prefix "modules/${{ matrix.module }}" ci --prefer-offline --no-audit --fund=false
      - name: Build module
        run: npm --prefix "modules/${{ matrix.module }}" run build
      - name: Test module
        if: matrix.module == 'registry' || matrix.module == 'router'
        run: node --test modules/${{ matrix.module }}/dist/*.test.js
      - name: Audit production dependencies
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if (( attempt == 3 )); then
                return 1
              fi
              echo "npm audit failed; retrying after $((attempt * 20)) seconds..." >&2
              sleep $((attempt * 20))
            done
          }
          retry npm --prefix "modules/${{ matrix.module }}" audit --omit=dev --audit-level=low

  source-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test host installation and updates
        run: |
          ./deploy/tests/test-host-update.sh
          ./deploy/tests/test-oci-registry-quadlet.sh
          ./deploy/tests/test-oci-registry-install-validation.sh
          ./deploy/tests/test-oci-tailnet-ingress.sh
          ./deploy/tests/test-oci-publish.sh
      - name: Shell syntax
        run: |
          bash -n deploy/install-host.sh deploy/arcturus-host-update deploy/arcturusctl \
            deploy/build-bundle.sh deploy/render-oci-registry-quadlet.sh \
            deploy/configure-oci-tailnet-ingress.sh deploy/arcturus-oci-publish.sh \
            deploy/tests/test-host-update.sh deploy/tests/test-oci-registry-quadlet.sh \
            deploy/tests/test-oci-registry-install-validation.sh \
            deploy/tests/test-oci-tailnet-ingress.sh \
            deploy/tests/test-oci-publish.sh
      - name: Validate package metadata and lockfiles
        shell: bash
        run: |
          set -euo pipefail
          python deploy/tests/check-version-consistency.py
          test -f rust/Cargo.lock
          for module in bus registry router; do
            python -m json.tool "modules/$module/package.json" >/dev/null
            python -m json.tool "modules/$module/package-lock.json" >/dev/null
          done
          python - <<'PY'
          from pathlib import Path
          import re

          unpinned = []
          for workflow in Path('.github/workflows').glob('*.yml'):
              for line_number, line in enumerate(workflow.read_text(encoding='utf-8').splitlines(), 1):
                  match = re.match(r'^\s*(?:-\s*)?uses:\s+[^@\s]+@([^\s#]+)', line)
                  if match and not re.fullmatch(r'[0-9a-f]{40}', match.group(1)):
                      unpinned.append(f'{workflow}:{line_number}: {line.strip()}')
          if unpinned:
              raise SystemExit('GitHub Actions must be pinned by full SHA:\n' + '\n'.join(unpinned))
          PY
      - name: Validate local Markdown links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          roots = [Path('README.md'), Path('CONTRIBUTING.md'), Path('SECURITY.md'), *Path('docs').rglob('*.md')]
          broken = []
          for document in roots:
              text = document.read_text(encoding='utf-8')
              for target in re.findall(r'\[[^]]+\]\(([^)]+)\)', text):
                  if target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  path = target.split('#', 1)[0]
                  if path and not (document.parent / path).resolve().exists():
                      broken.append(f'{document}: {target}')
          if broken:
              raise SystemExit('Broken Markdown links:\n' + '\n'.join(broken))
          PY
      - name: Check public-tree hygiene
        run: |
          set -euo pipefail
          test ! -e deploy/.env
          test ! -d docs/internal
          ! find . -type f \( -name '*.log' -o -name '*.tfstate' -o -name '*.sqlite' -o -name '*.pem' -o -name '*.key' \) -print -quit | grep -q .
