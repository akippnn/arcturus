name: Rust lock bootstrap

on:
  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-lock-bootstrap.yml'

permissions:
  contents: write

jobs:
  lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Generate and commit dependency lock
        shell: bash
        run: |
          set -euo pipefail
          cargo +1.97.0 generate-lockfile --manifest-path rust/Cargo.toml
          git add rust/Cargo.lock
          if git diff --cached --quiet; then
            echo 'Cargo.lock is already current.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git diff --cached --check
          git commit -m 'build: lock Rust workspace dependencies'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
