name: Security validation

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_RETRIES: '5'

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan full public history
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --connect-timeout 20 --max-time 300 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          ./gitleaks git --redact=100 --no-banner .

  python-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: deploy/requirements.txt
      - name: Install pip-audit
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if (( attempt == 3 )); then
                return 1
              fi
              echo "pip-audit install failed; retrying after $((attempt * 20)) seconds..." >&2
              sleep $((attempt * 20))
            done
          }
          retry python -m pip install --disable-pip-version-check pip-audit
      - name: Audit Python dependencies
        run: python -m pip_audit --requirement deploy/requirements.txt
