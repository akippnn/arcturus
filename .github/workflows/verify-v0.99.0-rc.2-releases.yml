name: Verify RC2 GitHub releases

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/verify-v0.99.0-rc.2-releases'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify both RC2 prereleases and assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag='v0.99.0-rc.2'

          verify_release() {
            local repo=$1
            local archive=$2
            local bundle=$3
            local data
            data="$(gh release view "$tag" --repo "$repo" --json tagName,isPrerelease,assets)"
            jq -e --arg tag "$tag" '.tagName == $tag and .isPrerelease == true' <<<"$data" >/dev/null
            jq -e --arg name "$archive" 'any(.assets[]; .name == $name)' <<<"$data" >/dev/null
            jq -e --arg name "$bundle" 'any(.assets[]; .name == $name)' <<<"$data" >/dev/null
            jq -e 'any(.assets[]; .name == "SHA256SUMS")' <<<"$data" >/dev/null
          }

          verify_release \
            'akippnn/arcturus' \
            'arcturus-0.99.0-rc.2-source.tar.gz' \
            'arcturus-0.99.0-rc.2.bundle'

          verify_release \
            'akippnn/arcturus-service-blueprint' \
            'arcturus-service-blueprint-0.99.0-rc.2-source.tar.gz' \
            'arcturus-service-blueprint-0.99.0-rc.2.bundle'
