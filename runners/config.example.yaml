# Generate a current base configuration with act_runner, then merge only the
# settings you need. This example deliberately avoids privileged containers,
# wildcard host-volume access, and mounting the host Podman socket.
log:
  level: info

runner:
  file: .runner
  capacity: 1
  timeout: 3h
  shutdown_timeout: 30s
  insecure: false
  labels:
    - "ubuntu-24.04:docker://docker.gitea.com/runner-images:ubuntu-24.04"

cache:
  enabled: true
  dir: ""
  host: ""
  port: 0

container:
  network: ""
  privileged: false
  options: ""
  valid_volumes: []
  docker_host: "-"
  force_pull: true
  force_rebuild: false
  require_docker: false
  bind_workdir: false
